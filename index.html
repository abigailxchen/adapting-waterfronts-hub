<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adapting Waterfronts</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo">
      <span class="logo-aw">AW</span>
      <span>Adapting Waterfronts</span>
    </div>
    <nav>
      <a href="#">About</a>
      <a href="#">Learn More</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    
    <div class="hero-image">
      <img src="bridge.png" alt="Golden Gate Illustration"/>
    </div>

    <div class="hero-content">
      <h1>San Francisco</h1>
      <p>
        Learn about the past, present, and future of San Francisco’s evolving shoreline and sea levels.
      </p>

      <div class="cta-group">
        <div>
          <p class="cta-label">In the city?</p>
          <button class="btn yellow">Explore the AR →</button>
        </div>

        <div>
          <p class="cta-label">At home?</p>
          <button class="btn blue">Explore online →</button>
        </div>
      </div>
    </div>

  </section>

  <!-- INPUT SECTION -->
  <section class="suggestion">
    <p>What city do you want to see this in next?</p>
    
    <div class="input-group">
      <input type="text" placeholder="Suggestions..." />
      <button class="btn yellow">Submit</button>
    </div>
  </section>

</body>
</html>
