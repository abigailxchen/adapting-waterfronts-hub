<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adapting Waterfronts</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="./img/AW_Favicon.png" />
</head>
<body>

  <!-- NAVBAR -->
<header class="navbar">

  <!-- Center logo -->
  <div class="logo-center">
    <img src="img/AW_Logo_Words.png" alt="Adapting Waterfronts Logo" class="logo-img">
  </div>

  <!-- Right nav -->
  <nav class="nav-right">
    <a href="about.html">About</a>
    <a href="#">Learn More</a>
  </nav>

</header>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-image">
      <img src="./img/bridge.png" alt="Golden Gate Illustration"/>
    </div>

    <div class="hero-content">
      <h1>San Francisco</h1>
      <p>
        Learn about the past, present, and future of San Francisco’s evolving shoreline and sea levels.
      </p>

      <div class="cta-group">
        <div>
          <p class="cta-label">In the city?</p>
          <a href="https://adaptingwaterfronts-sf.org/" target="_blank">
            <button class="btn yellow">Explore the AR →</button>
          </a>
        </div>

        <div>
          <p class="cta-label">At home?</p>
          <button class="btn blue">Explore online →</button>
        </div>
      </div>
    </div>
  </section>

  <!-- SUGGESTION INPUT SECTION -->
  <section class="suggestion">
    <p>What city do you want to see this in next?</p>
    <div class="input-group">
      <input type="text" placeholder="Suggestions..." />
      <button class="btn yellow">Submit</button>
    </div>
  </section>

</body>
</html>
